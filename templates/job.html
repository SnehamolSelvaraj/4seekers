{% extends "base.html" %}
{% load static %}

{% block title %}4SEEKERS | Find a Job{% endblock %}

{% block content %}
<style>
    .hire-section {
        padding: calc(var(--nav-height) + 60px) 20px 80px 20px;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, rgba(5, 5, 5, 1) 0%, rgba(10, 10, 10, 1) 100%);
        position: relative;
    }

    .hire-form-container {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(224, 224, 224, 0.2);
        /* Silver accent for job seekers */
        border-radius: 20px;
        backdrop-filter: blur(10px);
        padding: 50px;
        max-width: 700px;
        width: 100%;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .form-header {
        text-align: center;
        margin-bottom: 40px;
    }

    .form-header h2 {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-group label {
        display: block;
        color: var(--silver);
        margin-bottom: 8px;
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    .form-control {
        width: 100%;
        padding: 15px 20px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.3s ease;
    }

    .form-control:focus {
        outline: none;
        border-color: var(--silver);
        box-shadow: 0 0 15px rgba(224, 224, 224, 0.2);
    }

    .form-file {
        padding: 10px;
        background: rgba(0, 0, 0, 0.2);
    }

    .submit-btn-container {
        margin-top: 40px;
        text-align: center;
    }

    .btn-submit {
        background: linear-gradient(135deg, #ffffff, #a0a0a0);
        color: #000;
        border: none;
        padding: 16px 40px;
        font-size: 1.1rem;
        font-weight: 800;
        border-radius: 30px;
        cursor: pointer;
        width: 100%;
        transition: all 0.3s ease;
        box-shadow: 0 5px 20px rgba(224, 224, 224, 0.3);
    }

    .btn-submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(224, 224, 224, 0.6);
    }

    /* Grid for two-column inputs */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    @media (max-width: 600px) {
        .form-row {
            grid-template-columns: 1fr;
            gap: 0;
        }

        .hire-form-container {
            padding: 30px 20px;
        }
    }
</style>

<section class="hire-section">
    <div class="hire-form-container">
        <div class="form-header">
            <h2 class="metallic-silver">Find a Job</h2>
            <p style="color: #888;">Complete your profile to get discovered by top companies.</p>
        </div>

        <!-- Note the enctype attribute which is required for file uploads -->
        <form action="{% url 'job' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" class="form-control" placeholder="E.g. John Doe"
                        required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="E.g. john@example.com"
                        required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="E.g. 9876543210"
                        required>
                </div>
                <div class="form-group">
                    <label for="location">Current Location</label>
                    <input type="text" id="location" name="location" class="form-control"
                        placeholder="E.g. Mumbai, India" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="qualification">Qualification</label>
                    <input type="text" id="qualification" name="qualification" class="form-control"
                        placeholder="E.g. B.Tech, MBA" required>
                </div>
                <div class="form-group">
                    <label for="skills">Skills</label>
                    <input type="text" id="skills" name="skills" class="form-control"
                        placeholder="E.g. Python, Marketing" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="experience">Experience Level</label>
                    <select id="experience" name="experience" class="form-control" required>
                        <option value="Fresher" style="color:#000;">Fresher</option>
                        <option value="1-3 Years" style="color:#000;">1-3 Years</option>
                        <option value="3-5 Years" style="color:#000;">3-5 Years</option>
                        <option value="5+ Years" style="color:#000;">5+ Years</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="pref_location">Preferred Location</label>
                    <input type="text" id="pref_location" name="pref_location" class="form-control"
                        placeholder="E.g. Bangalore, Remote" required>
                </div>
            </div>

            <div class="form-group">
                <label for="screenshot">Payment Screenshot Upload (Image)</label>
                <input type="file" id="screenshot" name="screenshot" class="form-control form-file" accept="image/*"
                    required>
            </div>

            <div class="form-group">
                <label for="resume">Resume Upload (PDF/DOC)</label>
                <input type="file" id="resume" name="resume" class="form-control form-file" accept=".pdf,.doc,.docx"
                    required>
            </div>

            <div class="submit-btn-container">
                <button type="submit" class="btn-submit">Submit Application</button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
